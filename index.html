    /* ── SAVE BUTTON (below board, not part of saved image) ── */
    .actions {

    /* ── LOADING OVERLAY ── */
    #loading {

    #loading.show { display: flex; }

    .spinner {
      width: 46px; height: 46px;
      border: 5px solid rgba(255,255,255,0.25);
      border-top-color: #F5A623;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  /* ── AUTO-TAB: move focus after 2 digits ── */
  const circles = [...document.querySelectorAll('.c')];
  circles.forEach(function(inp, idx) {
    inp.addEventListener('input', function() {
      if (this.value.length >= 2 && idx < circles.length - 1) {
        circles[idx + 1].focus();
      }
    });
    inp.addEventListener('keydown', function(e) {
      const skip = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
      if (this.value.length >= 2 && !skip.includes(e.key)) e.preventDefault();
    });
  });

  /* ── DATE: auto-insert dashes as user types (DD-MM-YYYY) ── */
  const dateInput = document.getElementById('dateInput');
  dateInput.addEventListener('input', function() {
    let v = this.value.replace(/[^0-9]/g, '');   // digits only
    if (v.length > 2)  v = v.slice(0,2) + '-' + v.slice(2);
    if (v.length > 5)  v = v.slice(0,5) + '-' + v.slice(5);
    if (v.length > 10) v = v.slice(0,10);
    this.value = v;
  });

  /* ── SAVE AS IMAGE ──
     Always exports at 1280 × 1003 px regardless of viewport size.
     The save button is outside #board so it never appears in the capture. */
  async function saveAsImage() {
    const board   = document.getElementById('board');
    const loading = document.getElementById('loading');
    loading.classList.add('show');

    // Scale so the canvas output is always 1280 px wide (original image size)
    const scale = 1280 / board.offsetWidth;

    // Date is already in DD-MM-YYYY format (user typed it that way)
    const dateLabel = document.getElementById('dateInput').value;
    const circleValues = circles.map(function(i) { return i.value; });

    try {
      const canvas = await html2canvas(board, {
        scale: scale,
        backgroundColor: null,
        logging: false,
        onclone: function(clonedDoc) {
          /* Replace date input with a plain div so the text renders cleanly */
          const di = clonedDoc.getElementById('dateInput');
          if (di) {
            const dv = clonedDoc.createElement('div');
            dv.style.cssText = di.style.cssText +
              ';position:absolute;left:61.48%;top:9.37%;width:17.27%;height:4.39%;' +
              'display:flex;align-items:center;justify-content:center;' +
              'color:#111;font-weight:700;font-family:Arial,sans-serif;' +
              'font-size:2.4cqw;letter-spacing:1px;';
            dv.textContent = dateLabel;
            di.parentNode.replaceChild(dv, di);
          }

          /* Replace each circle input with a plain div centred over the circle */
          clonedDoc.querySelectorAll('.c').forEach(function(inp, idx) {
            const dv = clonedDoc.createElement('div');
            dv.style.cssText =
              'position:absolute;' +
              'left:'   + inp.style.left   + ';' +
              'top:'    + inp.style.top    + ';' +
              'width:6.953%;height:8.874%;' +
              'display:flex;align-items:center;justify-content:center;' +
              'color:#111;font-weight:800;font-family:Arial,sans-serif;' +
              'font-size:3.2cqw;line-height:1;';
            const val = circleValues[idx];
            dv.textContent = (val !== '' && val !== undefined && val !== null)
              ? String(parseInt(val, 10))
              : '';
            inp.parentNode.replaceChild(dv, inp);
          });
        }
      });

      const fname = 'mywin-result' + (dateLabel ? '-' + dateLabel : '') + '.png';
      const link  = document.createElement('a');
      link.download = fname;
      link.href     = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      alert('Could not save image: ' + err.message);
    } finally {
      loading.classList.remove('show');
    }
  }
</script>
